name: Publish Package

on:
  workflow_dispatch:
    inputs:
      node-package:
        type: choice
        description: Node package to publish
        required: true
        options:
          - barcode
          - channable
          - clockify-enhanced
          - cronhooks
          - fulfillmenttools
          - google-enhanced
          - headwind-mdm
          - kaufland-marketplace
          - moco
          - otto-market
          - sentry-io-enhanced

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  node-package:
    name: Node Package (${{ github.event.inputs.node-package }})
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: 🏗 Setup git user
        uses: fregante/setup-git-user@024bc0b8e177d7e77203b48dab6fb45666854b35 # v2.0.2

      - name: 🏗 Install canvas deps
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libcairo2-dev libgif-dev libjpeg-dev libpango1.0-dev librsvg2-dev
          version: canvas-deps-1

      - name: 🏗 Setup Turborepo
        uses: skriptfabrik/github-actions/setup-turborepo@main
        with:
          node-registry-url: https://registry.npmjs.org

      - name: 🔨 Build node package
        run: pnpm -s run build
        working-directory: packages/${{ github.event.inputs.node-package }}

      - name: 🚀 Bump version, update changelog, publish package and create release
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_MODE: 'true'
        run: pnpm -s run release
        working-directory: packages/${{ github.event.inputs.node-package }}
